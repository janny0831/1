<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙語文件自動翻譯工具 (修正版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .drag-over { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div class="max-w-4xl mx-auto pt-10 px-4 pb-20">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2"><i class="fa-solid fa-language text-blue-500 mr-2"></i>自動雙語文件翻譯機</h1>
            <p class="text-gray-500">保留中文原文，於下方自動新增泰文翻譯，維持 Excel 原始排版。</p>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="mb-6 flex items-center justify-between border-b pb-4">
                <h2 class="text-lg font-semibold text-gray-700">翻譯設定</h2>
                <div class="flex items-center space-x-2">
                    <label class="text-sm text-gray-600">目標語言:</label>
                    <select id="targetLang" class="border border-gray-300 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="th" selected>泰文 (Thai)</option>
                        <option value="en">英文 (English)</option>
                    </select>
                </div>
            </div>

            <div id="dropZone" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center cursor-pointer transition-colors duration-200 hover:bg-gray-50">
                <input type="file" id="fileInput" accept=".xlsx" class="hidden" />
                <div class="text-5xl text-gray-400 mb-4"><i class="fa-regular fa-file-excel"></i></div>
                <h3 class="text-lg font-medium text-gray-700 mb-1">點擊或拖曳檔案至此</h3>
                <p class="text-sm text-gray-500">僅支援 .xlsx 格式</p>
            </div>

            <div id="fileInfo" class="hidden mt-6 bg-blue-50 border border-blue-100 rounded-lg p-4 flex items-center justify-between">
                <div class="flex items-center">
                    <i class="fa-solid fa-file-excel text-green-600 text-2xl mr-3"></i>
                    <div>
                        <p id="fileName" class="font-medium text-gray-800"></p>
                        <p id="fileSize" class="text-xs text-gray-500"></p>
                    </div>
                </div>
                <button id="startBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors shadow-sm flex items-center">
                    <i class="fa-solid fa-play mr-2"></i> 開始翻譯
                </button>
            </div>

            <div id="progressArea" class="hidden mt-8">
                <div class="flex justify-between text-sm text-gray-600 mb-2">
                    <span id="progressText">準備中...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div class="mt-4 bg-gray-900 rounded-lg p-4 h-48 overflow-y-auto font-mono text-xs text-green-400" id="logConsole"></div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const startBtn = document.getElementById('startBtn');
        const logConsole = document.getElementById('logConsole');

        let currentFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFileSelect(e.target.files[0]));
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFileSelect(e.dataTransfer.files[0]); });

        function handleFileSelect(file) {
            if (!file || !file.name.endsWith('.xlsx')) return;
            currentFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(2) + ' KB';
            fileInfo.classList.remove('hidden');
        }

        async function translateText(text, targetLang) {
            if (!text || String(text).trim() === "") return text;
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                const data = await response.json();
                return data[0].map(x => x[0]).join('') || text;
            } catch (e) { return text; }
        }

        startBtn.addEventListener('click', async () => {
            if (!currentFile) return;
            const targetLang = document.getElementById('targetLang').value;
            startBtn.disabled = true;
            document.getElementById('progressArea').classList.remove('hidden');
            logConsole.innerHTML = "<div>> 任務開始...</div>";

            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(await currentFile.arrayBuffer());

            let cells = [];
            workbook.eachSheet(ws => {
                ws.eachRow(row => {
                    row.eachCell(cell => {
                        if (cell.value && typeof cell.value === 'string' && cell.value.trim()) {
                            cells.push(cell);
                        }
                    });
                });
            });

            for (let i = 0; i < cells.length; i++) {
                const cell = cells[i];
                const originalText = String(cell.value).trim();
                
                // 執行翻譯
                const translatedText = await translateText(originalText, targetLang);
                
                // 重要修正：確保中文在第一行，泰文在第二行，不重複泰文
                cell.value = `${originalText}\n(${translatedText})`;
                
                // 強制換行排版
                cell.alignment = { ...cell.alignment, wrapText: true, vertical: 'middle' };

                const p = Math.round(((i + 1) / cells.length) * 100);
                document.getElementById('progressBar').style.width = p + '%';
                document.getElementById('progressPercent').textContent = p + '%';
                document.getElementById('progressText').textContent = `處理中: ${i+1}/${cells.length}`;
            }

            const buffer = await workbook.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), `${currentFile.name.replace('.xlsx', '')}_Bilingual.xlsx`);
            logConsole.innerHTML += "<div>> ✅ 翻譯完成，請查看下載檔案。</div>";
            startBtn.disabled = false;
        });
    </script>
</body>
</html>
